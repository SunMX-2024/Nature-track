      <circle cx="42" cy="48" r="22" fill="#9A6A28"/>
      <path d="M34 37H51V58H34V37ZM39 43H46M39 49H46" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="82" y="39" fill="#24312D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Read smarter</text>
      <text x="82" y="68" fill="#607067" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Compact author-journal-title view</text>
    </g>

    <g transform="translate(326 351)">
