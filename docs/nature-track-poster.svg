      <text x="82" y="39" fill="#24312D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Send digests</text>
      <text x="82" y="68" fill="#607067" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Manual email or scheduled push</text>
    </g>
