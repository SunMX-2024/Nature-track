<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nature-track feature poster</title>
  <desc id="desc">A compact feature poster for a local literature tracking tool that monitors journals, filters papers, opens PDFs, and sends email digests.</desc>
  <rect width="1200" height="675" fill="#F7F8F3"/>
  <rect x="48" y="48" width="1104" height="579" rx="24" fill="#FFFFFF" stroke="#D8DED3" stroke-width="2"/>

  <g transform="translate(86 84)">
    <text x="0" y="0" fill="#1E2A26" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Nature-track</text>
    <text x="0" y="48" fill="#1E2A26" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="760">Never miss the papers</text>
    <text x="0" y="108" fill="#1E2A26" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="760">that shape your field.</text>
    <text x="2" y="154" fill="#53625B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">A local literature radar for Nature, Science, One Earth, GCB, and other</text>
    <text x="2" y="184" fill="#53625B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">Earth and environmental science journals.</text>

    <g transform="translate(0 235)">
      <rect x="0" y="0" width="302" height="96" rx="14" fill="#F1F5EA" stroke="#D2DDC8"/>
