      <text x="82" y="39" fill="#24312D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Track journals</text>
      <text x="82" y="68" fill="#607067" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Curated lists plus custom targets</text>
    </g>

    <g transform="translate(326 235)">
      <rect x="0" y="0" width="302" height="96" rx="14" fill="#EEF4F7" stroke="#CADBE2"/>
      <circle cx="42" cy="48" r="22" fill="#276B85"/>
      <path d="M31 48H53M42 37V59" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
      <text x="82" y="39" fill="#24312D" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Filter fast</text>
      <text x="82" y="68" fill="#607067" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Date, keyword, type, abstract</text>
    </g>

